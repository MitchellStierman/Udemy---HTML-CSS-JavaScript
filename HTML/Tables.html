<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Table Tutorial</title>
    </head>

    <body>


        <table width="100%" border="1" bordercolor="red" cellspacing="2" cellpadding="2">
            <tr>
                <td>
                    <table width="500" border="1" bordercolor="blue" cellspacing="2" cellpadding="2">
                        <tr>
                            <td colspan="2">Sports Numbers</td>
                        </tr>
                        <tr>
                            <td>Sport</td>
                            <td>Response</td>
                        </tr>

                        <tr>
                            <td>Basketball</td>
                            <td>19</td>
                        </tr>

                        <tr>
                            <td>Football</td>
                            <td>11</td>
                        </tr>

                        <tr>
                            <td>Baseball</td>
                            <td>23</td>
                        </tr>

                        <tr>
                            <td>Soccer</td>
                            <td>14</td>
                        </tr>

                        <tr>
                            <td>Tennis</td>
                            <td>12</td>
                        </tr>
                    </table>                    
                </td>
            </tr>
        </table>
    </body>
</html>
